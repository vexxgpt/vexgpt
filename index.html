<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VexGPT — Download</title>

  <style>
    :root {
      --brand:#1fa64a;
      --brandDark:#16823a;
      --glow:rgba(31,166,74,.45);
    }

    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top,#101710,#050805 70%);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .wrap {
      width:100%;
      max-width:520px;
      padding:24px;
      text-align:center;
    }

    .card {
      background:linear-gradient(180deg,#0e150e,#070b07);
      border-radius:18px;
      padding:32px 22px;
      box-shadow:0 20px 60px rgba(0,0,0,.6);
      animation:fadeUp .7s ease;
    }

    @keyframes fadeUp {
      from {opacity:0; transform:translateY(20px);}
      to {opacity:1; transform:none;}
    }

    .logo {
      width:210px;
      margin:0 auto 18px;
      display:block;
      filter:drop-shadow(0 0 12px var(--glow));
    }

    h1 {
      margin:0 0 8px;
      font-size:30px;
      font-weight:900;
      letter-spacing:.4px;
    }

    p.sub {
      margin:0 0 26px;
      font-size:16px;
      line-height:1.45;
      color:#cfead7;
    }

    .cta {
      display:inline-block;
      padding:16px 26px;
      border-radius:12px;
      font-size:18px;
      font-weight:800;
      color:#fff;
      text-decoration:none;
      background:linear-gradient(135deg,var(--brand),#29d866);
      box-shadow:0 0 0 0 var(--glow);
      transition:.25s ease;
    }

    .cta:hover {
      transform:translateY(-2px) scale(1.02);
      box-shadow:0 0 24px 6px var(--glow);
      background:linear-gradient(135deg,#29d866,var(--brand));
    }

    .badge {
      margin-top:18px;
    }

    .badge img {
      height:46px;
      transition:.2s ease;
      filter:drop-shadow(0 0 10px rgba(0,0,0,.6));
    }

    .badge img:hover {
      transform:scale(1.06);
    }

    .hint {
      margin-top:14px;
      font-size:13px;
      color:#9acfb0;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">

      <img class="logo"
           src="https://i.hizliresim.com/a1lgdxi.jpg"
           alt="VexGPT logo" />

      <h1>VexGPT</h1>

      <p class="sub">
        Dünyanın en güçlü yapay zekâ destekli futbol tahmin uygulaması<br>
        Google Play'e yönlendiriliyorsunuz.
      </p>

      <a class="cta"
         href="https://play.google.com/store/apps/details?id=com.vexgpt.app">
        Google Play'den indirin

      </a>

      <div class="badge">
        <a href="https://play.google.com/store/apps/details?id=com.vexgpt.app">
          <img
            alt="Get it on Google Play"
            src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" />
        </a>
      </div>

      <div class="hint">
       Yapay zeka destekli tahminler • Canlı analiz • Kazandıran içgörüler
      </div>

    </div>
  </div>

  <script>
    // Soft auto redirect (Android only)
    if (/android/i.test(navigator.userAgent)) {
      setTimeout(() => {
        window.location.href =
          "https://play.google.com/store/apps/details?id=com.vexgpt.app";
      }, 900);
    }
  </script>
</body>
</html>
