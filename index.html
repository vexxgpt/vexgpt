<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scouter — Download</title>
  <style>
    :root { --brand:#4a8b38; --brandDark:#3a6f2b; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:#f7f7f7; color:#111; display:flex; min-height:100vh; align-items:center; justify-content:center;
    }
    .wrap { width:100%; max-width:520px; padding:24px; text-align:center; }
    .card {
      background:#fff; border-radius:16px; padding:28px 20px; box-shadow:0 10px 30px rgba(0,0,0,.06);
    }
    .logo { width:220px; height:auto; margin:0 auto 16px; display:block; }
    h1 { margin:0 0 6px; font-size:28px; font-weight:800; }
    p.sub { margin:0 0 22px; color:#555; }
    .cta {
      display:inline-block; padding:14px 22px; border-radius:10px; font-weight:700; font-size:18px;
      background:var(--brand); color:#fff; text-decoration:none; transition:.2s ease;
    }
    .cta:hover { background:var(--brandDark); }
    .badges { display:flex; gap:12px; justify-content:center; margin-top:12px; flex-wrap:wrap; }
    .hint { margin-top:14px; font-size:13px; color:#777; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <img class="logo" alt="Scouter logo"
        src="https://scouter-app.co/wp-content/uploads/brizy/imgs/Screen_Shot_2023-01-14_at_16.18.55-removebg-preview-1-292x128x0x0x292x128x1675075070.png" />

      <h1>Scouter</h1>
      <p class="sub">AI tips & live football scores. Get the app now.</p>

      <a id="downloadBtn" class="cta" href="#">Download</a>

      <div class="badges">
        <a id="storeBadge1" href="https://apps.apple.com/app/scouter-soccer-live-scores/id1569637963" aria-label="Download on the App Store">
          <img alt="App Store" height="40"
               src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/en-us?size=135x40&releaseDate=1620518400" />
        </a>
        <a id="storeBadge2" href="https://play.google.com/store/apps/details?id=com.artlines.scouter" aria-label="Get it on Google Play">
          <img alt="Google Play" height="40"
               src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png" />
        </a>
      </div>

      <div id="inAppHint" class="hint hidden">
        If this page stays here, tap <strong>Download</strong> again or choose “Open in browser” and retry.
      </div>
    </div>
  </div>

  <script>
    (function () {
      var ua = navigator.userAgent || navigator.vendor || window.opera;

      var isAndroid = /android/i.test(ua);
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isMetaInApp = /(FBAN|FBAV|Instagram|FB_IAB)/i.test(ua);
      var isChromeOnAndroid = isAndroid && /Chrome\/\d+/i.test(ua);
      var isMobile = isAndroid || isIOS;

      // Store links
      var iosHttps = "https://apps.apple.com/app/scouter-soccer-live-scores/id1569637963";
      var iosItms  = "itms-apps://apps.apple.com/app/id1569637963";
      var playHttps = "https://play.google.com/store/apps/details?id=com.artlines.scouter";
      var playMarket = "market://details?id=com.artlines.scouter";
      var playIntent = "intent://details?id=com.artlines.scouter#Intent;scheme=market;package=com.android.vending;end";

      function setClickTargets(href) {
        var btn = document.getElementById("downloadBtn");
        //var b1 = document.getElementById("storeBadge1");
        //var b2 = document.getElementById("storeBadge2");
        btn.setAttribute("href", href);
        //b1.setAttribute("href", isIOS ? iosHttps : href);
        //b2.setAttribute("href", isAndroid ? playHttps : href);
      }

      // Build sequences per platform
      var autoSeq = [];
      var manualHref = "https://scouter-app.co";

      if (isIOS) {
        autoSeq = [iosItms, iosHttps];
        manualHref = iosHttps;
      } else if (isAndroid) {
        if (isMetaInApp || isChromeOnAndroid) {
          autoSeq = [playIntent, playMarket, playHttps];
        } else {
          autoSeq = [playMarket, playHttps];
        }
        manualHref = playHttps;
      } else {
        // Desktop: no auto-redirect attempts
        manualHref = "https://scouter-app.co";
      }

      setClickTargets(manualHref);

      // Try a sequence of links safely
      function tryOpenSequence(seq, fallbackHref, showHint) {
        // Filter out undefined / empty URLs
        seq = (seq || []).filter(Boolean);
        if (!seq.length) {
          if (showHint) document.getElementById("inAppHint").classList.remove("hidden");
          setClickTargets(fallbackHref);
          return;
        }
        var i = 0;
        (function next() {
          if (i >= seq.length) {
            if (showHint) document.getElementById("inAppHint").classList.remove("hidden");
            setClickTargets(fallbackHref);
            return;
          }
          var url = seq[i++];
          try {
            window.location.assign(url);
          } catch (e) {
            // ignore and continue
          }
          setTimeout(next, 500);
        })();
      }

      // Auto-try only when we actually have a candidate
      setTimeout(function () {
        if (!isMobile) return;                 // desktop: do nothing
        if (!autoSeq.length) return;           // safety guard
        if (!isMetaInApp) {
          // Non Meta IAB: attempt just the first usable URL
          tryOpenSequence([autoSeq[0]].filter(Boolean), manualHref, false);
        } else {
          // Meta IAB: attempt full sequence, show hint if blocked
          tryOpenSequence(autoSeq, manualHref, true);
        }
      }, 250);

      // Retry on first user gesture (helps iOS IAB)
      var fired = false;
      function onFirstGesture() {
        if (fired) return;
        fired = true;
        if (autoSeq.length) tryOpenSequence(autoSeq, manualHref, true);
      }
      document.addEventListener("click", onFirstGesture, { once: true, passive: true });
      document.addEventListener("touchstart", onFirstGesture, { once: true, passive: true });

      document.addEventListener("visibilitychange", function(){
        if (document.visibilityState === "visible" && !fired && autoSeq.length) {
          tryOpenSequence(autoSeq, manualHref, true);
          fired = true;
        }
      });
    })();
  </script>

</body>
</html>
